name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
    
    - name: Setup Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '16'
    
    - name: Run tests
      run: npm test
      
    - name: Run linting
      run: npm run lint
      
    - name: File structure validation
      run: |
        echo "Checking file structure"
        # List HTML files
        find . -name "*.html" -type f
        # List JS files
        find . -name "*.js" -type f
        # List CSS files
        find . -name "*.css" -type f 